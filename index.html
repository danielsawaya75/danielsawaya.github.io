<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Sawaya | Official Site</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            border: 5px solid #00f2ff; /* Border ya nje ya neon */
        }
        .profile-card {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
        }
        .neon {
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
        }
        .glitch {
            font-family: monospace;
            color: #888;
            letter-spacing: 2px;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: transparent;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px #00f2ff;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <h1>DANIEL <span class="neon">SAWAYA</span></h1>
        <p class="glitch">// NETWORK ENGINEER & ELECTRONICS DEVELOPER</p>
        <p>Welcome to the World of ShadowWalker.</p>
        <button class="btn">View Projects</button>
    </div>
</body>
</html>
